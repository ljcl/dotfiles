# My TMUX config file.
# Learning the hard way after I'm not able to type in my buffer seemingly at random.

# Use ZSH
set-option -g default-shell /bin/zsh
set-option -ga terminal-overrides ',*:enacs@:smacs@:rmacs@:acsc@'

# 256 colors
set -g default-terminal "screen-256color"

# set scrollback history to 10000 (10k)
set -g history-limit 10000
bind u send-keys C-l \; run-shell "sleep .3s" \; clear-history

# set Ctrl-a as the default prefix key combination
# and unbind C-b to free it up
set -g prefix C-a
unbind C-b

# use send-prefix to pass C-a through to application
bind C-a send-prefix

# shorten command delay
# set -sg escape-time 1
set -s escape-time 0

#
# RESIZING AND NAVIGATION
#

#setw -g aggressive-resize on

# Make new windows without a default title
set-option -g default-command "~ > /dev/null 2>&1; reattach-to-user-namespace -l zsh"

# Allow naming of new windows
bind C new-window \; command-prompt -p "Name for this new window: " "rename-window '%%'"

# set window and pane index to 1 (0 by default)
set-option -g base-index 1
setw -g pane-base-index 1

# use PREFIX | to split window horizontally and PREFIX - to split vertically
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# and use C-h and C-l to cycle thru windows
bind -r C-h         select-window -t :-
bind -r C-Left      select-window -t :-
bind -r C-l         select-window -t :+
bind -r C-Right     select-window -t :+

bind -n C-S-Left    swap-window -t -1
bind -n C-S-Right   swap-window -t +1

# Make the current window the first window
bind T swap-window -t 1

# map Vi movement keys as pane movement keys
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# resize panes using PREFIX H, J, K, L
bind -r H           resize-pane -L 5
bind -r S-Left      resize-pane -L 20
bind -r J           resize-pane -D 5
bind -r S-Down      resize-pane -D 20
bind -r K           resize-pane -U 5
bind -r S-Up        resize-pane -U 20
bind -r L           resize-pane -R 5
bind -r S-Right     resize-pane -R 20

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

#
# COPY MODE
#

# Scrolling enters copy mode
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
# bind -n WheelDownPane select-pane -t= \; send-keys -M

# use vim keybindings in copy mode
setw -g mode-keys vi

# provide access to the clipboard for pbpaste, pbcopy
set-option -g default-command "~ > /dev/null 2>&1; reattach-to-user-namespace -l zsh"
set-window-option -g automatic-rename off
set-option -g allow-rename off

bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down

unbind-key -T copy-mode-vi Space     ;   bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind-key -T copy-mode-vi Enter     ;   bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind-key -T copy-mode-vi C-v       ;   bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind-key -T copy-mode-vi [         ;   bind-key -T copy-mode-vi [ send-keys -X begin-selection
unbind-key -T copy-mode-vi ]         ;   bind-key -T copy-mode-vi ] send-keys -X copy-selection

# y and control y will yank
bind y run 'tmux save-buffer - | reattach-to-user-namespace pbcopy '
bind C-y run 'tmux save-buffer - | reattach-to-user-namespace pbcopy '

#
# INTERFACE / STATUS BAR
#

# set pane colors - hilight the active pane
set-option -g pane-border-fg colour244 #base02
set-option -g pane-active-border-fg colour250 #base01

# colorize messages in the command line
set-option -g message-bg black #base02
set-option -g message-fg brightred #orange

set-option -g status on                # turn the status bar on
# set -g status-utf8 on                  # set utf-8 for the status bar
set -g status-interval 5               # set update frequencey (default 15 seconds)
set -g status-justify centre           # center window list for clarity

# visual notification of activity in other windows
setw -g monitor-activity on
set -g visual-activity on

# set color for status bar
set-option -g status-bg colour235 #base02
set-option -g status-fg yellow #yellow
set-option -g status-attr dim

# set window list colors - red for active and cyan for inactive
set-window-option -g window-status-fg brightblue #base0
set-window-option -g window-status-bg colour236
set-window-option -g window-status-attr dim

set-window-option -g window-status-current-fg brightred #orange
set-window-option -g window-status-current-bg colour236
set-window-option -g window-status-current-attr bright

# show session name, window & pane number, date and time on right side of
# status bar
set -g status-left-length 12
set -g status-left "#[fg=yellow]#(ifconfig en0 | grep 'inet ' | awk '{print $2}') #(ifconfig en1 | grep 'inet ' | awk '{print $2}')"
set -g status-right-length 9
set -g status-right "#[fg=brightgreen]#(ifconfig en0 | grep 'inet ' | awk '{print \"en0\"}') #(ifconfig en1 | grep 'inet ' | awk '{print \"en1\"}')#[fg=brightblue]#I:#P"
